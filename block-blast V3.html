<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Block Blast!</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1a0a2e;
    --panel: #2d1b4e;
    --board-bg: #120820;
    --cell-empty: #1e1035;
    --cell-border: #2a1a45;
    --accent: #ff6b35;
    --gold: #ffd700;
    --c1: #ff4757; --c1s: #ff6b78;
    --c2: #2ed573; --c2s: #7bed9f;
    --c3: #1e90ff; --c3s: #70b8ff;
    --c4: #ffa502; --c4s: #ffc048;
    --c5: #a855f7; --c5s: #c084fc;
    --c6: #06d6a0; --c6s: #34f5c0;
    --c7: #ff6b9d; --c7s: #ff9dc4;
    --shadow: 0 8px 32px rgba(0,0,0,0.5);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    user-select: none;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 20% 20%, #3d1a6e44 0%, transparent 60%),
                radial-gradient(ellipse at 80% 80%, #1a3d6e44 0%, transparent 60%);
    pointer-events: none;
  }

  #game-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  #header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 360px;
    gap: 12px;
  }

  #title-box {
    font-family: 'Fredoka One', cursive;
    font-size: 28px;
    background: linear-gradient(135deg, #ff6b35, #ffd700, #ff6b35);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 1px;
    text-shadow: none;
    filter: drop-shadow(0 2px 8px #ff6b3588);
  }

  #score-area {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 2px;
  }

  .score-label {
    font-size: 10px;
    font-weight: 800;
    color: #8b6fc4;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  #score-display {
    font-family: 'Fredoka One', cursive;
    font-size: 28px;
    color: #fff;
    line-height: 1;
    filter: drop-shadow(0 0 8px #ffd70066);
    transition: transform 0.1s;
  }

  #score-display.pop {
    transform: scale(1.3);
    color: var(--gold);
  }

  #best-display {
    font-size: 12px;
    font-weight: 800;
    color: #a78bda;
  }

  /* Board */
  #board-container {
    background: var(--panel);
    border-radius: 24px;
    padding: 14px;
    box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.06);
  }

  #board {
    display: grid;
    grid-template-columns: repeat(8, 38px);
    grid-template-rows: repeat(8, 38px);
    gap: 3px;
    background: var(--board-bg);
    border-radius: 16px;
    padding: 10px;
    position: relative;
  }

  .cell {
    width: 38px;
    height: 38px;
    border-radius: 8px;
    background: var(--cell-empty);
    border: 1.5px solid var(--cell-border);
    transition: background 0.1s, transform 0.1s, box-shadow 0.1s;
    position: relative;
    overflow: hidden;
  }

  .cell.filled {
    border-color: transparent;
  }

  .cell.filled::after {
    content: '';
    position: absolute;
    top: 3px; left: 3px; right: 30%; height: 35%;
    background: rgba(255,255,255,0.25);
    border-radius: 3px;
  }

  .cell.ghost {
    opacity: 0.45;
    border-color: transparent;
  }

  .cell.highlight {
    animation: cellPop 0.35s ease;
  }

  @keyframes cellPop {
    0% { transform: scale(1); }
    40% { transform: scale(1.15); }
    100% { transform: scale(1); }
  }

  .cell.clearing {
    animation: clearCell 0.4s ease forwards;
  }

  @keyframes clearCell {
    0% { transform: scale(1); opacity: 1; }
    40% { transform: scale(1.25); opacity: 0.9; }
    100% { transform: scale(0); opacity: 0; }
  }

  .cell.clear-flash {
    animation: flashCell 0.35s ease;
  }
  @keyframes flashCell {
    0%,100% { filter: brightness(1); }
    50% { filter: brightness(2.5); }
  }

  /* Row/col highlight when hovering */
  .cell.row-col-hint {
    background: rgba(255,255,255,0.06);
  }

  /* Color classes */
  .color-0 { background: var(--c1); box-shadow: 0 4px 0 #c23348, inset 0 1px 0 rgba(255,255,255,0.3); }
  .color-1 { background: var(--c2); box-shadow: 0 4px 0 #1ea854, inset 0 1px 0 rgba(255,255,255,0.3); }
  .color-2 { background: var(--c3); box-shadow: 0 4px 0 #1260cc, inset 0 1px 0 rgba(255,255,255,0.3); }
  .color-3 { background: var(--c4); box-shadow: 0 4px 0 #c47d00, inset 0 1px 0 rgba(255,255,255,0.3); }
  .color-4 { background: var(--c5); box-shadow: 0 4px 0 #7e22ce, inset 0 1px 0 rgba(255,255,255,0.3); }
  .color-5 { background: var(--c6); box-shadow: 0 4px 0 #059669, inset 0 1px 0 rgba(255,255,255,0.3); }
  .color-6 { background: var(--c7); box-shadow: 0 4px 0 #c4396e, inset 0 1px 0 rgba(255,255,255,0.3); }

  .ghost.color-0 { background: var(--c1); box-shadow: none; }
  .ghost.color-1 { background: var(--c2); box-shadow: none; }
  .ghost.color-2 { background: var(--c3); box-shadow: none; }
  .ghost.color-3 { background: var(--c4); box-shadow: none; }
  .ghost.color-4 { background: var(--c5); box-shadow: none; }
  .ghost.color-5 { background: var(--c6); box-shadow: none; }
  .ghost.color-6 { background: var(--c7); box-shadow: none; }

  /* Pieces area */
  #pieces-area {
    display: flex;
    justify-content: space-around;
    align-items: center;
    width: 360px;
    background: var(--panel);
    border-radius: 24px;
    padding: 16px 10px;
    box-shadow: var(--shadow);
    border: 1px solid rgba(255,255,255,0.06);
    gap: 8px;
    min-height: 110px;
  }

  .piece-slot {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 16px;
    min-height: 80px;
    cursor: grab;
    transition: transform 0.15s, filter 0.15s;
    position: relative;
  }

  .piece-slot:active { cursor: grabbing; }

  .piece-slot.used { opacity: 0; pointer-events: none; }

  .piece-slot.selected {
    transform: scale(1.12);
    filter: drop-shadow(0 0 10px rgba(255,255,255,0.4));
  }

  .piece-slot.invalid-drop {
    animation: shake 0.3s ease;
  }

  @keyframes shake {
    0%,100%{transform:translateX(0)}
    25%{transform:translateX(-5px)}
    75%{transform:translateX(5px)}
  }

  .piece-grid {
    display: grid;
    gap: 3px;
  }

  .piece-cell {
    width: 20px;
    height: 20px;
    border-radius: 5px;
    border: none;
  }

  .piece-cell.empty { background: transparent; }

  .piece-cell::after {
    content: '';
    display: block;
    margin: 3px auto 0;
    width: 60%;
    height: 35%;
    background: rgba(255,255,255,0.28);
    border-radius: 2px;
  }

  .piece-cell.empty::after { display: none; }

  /* Floating drag piece */
  #drag-piece {
    position: fixed;
    pointer-events: none;
    z-index: 1000;
    display: none;
    transform: translate(-50%, -100%);
  }

  #drag-piece .piece-grid {
    gap: 3px;
  }

  #drag-piece .piece-cell {
    width: 38px;
    height: 38px;
    border-radius: 8px;
  }

  /* Game over overlay */
  #game-over {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10,5,20,0.88);
    z-index: 500;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 20px;
    backdrop-filter: blur(6px);
  }

  #game-over.show { display: flex; }

  .go-box {
    background: var(--panel);
    border-radius: 28px;
    padding: 36px 48px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    border: 1px solid rgba(255,255,255,0.1);
    animation: goSlideIn 0.4s cubic-bezier(.175,.885,.32,1.275);
  }

  @keyframes goSlideIn {
    from { transform: scale(0.7); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  .go-title {
    font-family: 'Fredoka One', cursive;
    font-size: 42px;
    color: #fff;
    margin-bottom: 6px;
    filter: drop-shadow(0 0 20px #ff4757);
  }

  .go-score-label { font-size: 13px; font-weight: 800; color: #8b6fc4; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 4px; }
  .go-score { font-family: 'Fredoka One', cursive; font-size: 52px; color: var(--gold); filter: drop-shadow(0 0 12px #ffd70066); }
  .go-best { font-size: 15px; font-weight: 800; color: #a78bda; margin-top: 4px; margin-bottom: 20px; }

  #restart-btn {
    background: linear-gradient(135deg, #ff6b35, #ff4757);
    border: none;
    border-radius: 50px;
    color: #fff;
    font-family: 'Fredoka One', cursive;
    font-size: 22px;
    padding: 14px 48px;
    cursor: pointer;
    box-shadow: 0 6px 0 #c42020, 0 10px 30px rgba(255,71,87,0.4);
    transition: transform 0.1s, box-shadow 0.1s;
    letter-spacing: 1px;
  }

  #restart-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 0 #c42020, 0 14px 34px rgba(255,71,87,0.5); }
  #restart-btn:active { transform: translateY(3px); box-shadow: 0 3px 0 #c42020, 0 6px 16px rgba(255,71,87,0.4); }

  /* Score pop particles */
  .score-particle {
    position: fixed;
    font-family: 'Fredoka One', cursive;
    font-size: 18px;
    color: var(--gold);
    pointer-events: none;
    z-index: 999;
    text-shadow: 0 0 10px #ffd70088;
    animation: floatUp 0.8s ease forwards;
  }

  @keyframes floatUp {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-60px) scale(1.4); }
  }

  /* Combo banner */
  #combo-banner {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    font-family: 'Fredoka One', cursive;
    font-size: 48px;
    color: var(--gold);
    z-index: 900;
    text-shadow: 0 0 30px #ffd700, 0 4px 0 #c47d00;
    pointer-events: none;
    transition: none;
  }

  #combo-banner.show {
    animation: comboPop 0.7s cubic-bezier(.175,.885,.32,1.275) forwards;
  }

  @keyframes comboPop {
    0% { transform: translate(-50%,-50%) scale(0); opacity: 0; }
    40% { transform: translate(-50%,-50%) scale(1.2); opacity: 1; }
    70% { transform: translate(-50%,-60%) scale(1); opacity: 1; }
    100% { transform: translate(-50%,-80%) scale(0.8); opacity: 0; }
  }
</style>
</head>
<body>

<div id="game-wrapper">
  <div id="header">
    <div id="title-box">Block Blast!</div>
    <div id="score-area">
      <div class="score-label">Score</div>
      <div id="score-display">0</div>
      <div id="best-display">Best: 0</div>
    </div>
  </div>

  <div id="board-container">
    <div id="board"></div>
  </div>

  <div id="pieces-area">
    <div class="piece-slot" id="slot-0"></div>
    <div class="piece-slot" id="slot-1"></div>
    <div class="piece-slot" id="slot-2"></div>
  </div>
</div>

<!-- Floating drag piece -->
<div id="drag-piece">
  <div class="piece-grid"></div>
</div>

<!-- Game Over -->
<div id="game-over">
  <div class="go-box">
    <div class="go-title">Game Over!</div>
    <div class="go-score-label">Your Score</div>
    <div class="go-score" id="go-score">0</div>
    <div class="go-best" id="go-best">Best: 0</div>
    <button id="restart-btn">Play Again</button>
  </div>
</div>

<div id="combo-banner"></div>

<script>
const GRID = 8;
const COLORS = 7;

// All piece shapes: [rows][cols] with 1=filled, 0=empty
const PIECES = [
  // 1x1
  { shape: [[1]], w:1, h:1 },
  // 1x2
  { shape: [[1,1]], w:2, h:1 },
  // 1x3
  { shape: [[1,1,1]], w:3, h:1 },
  // 1x4
  { shape: [[1,1,1,1]], w:4, h:1 },
  // 1x5
  { shape: [[1,1,1,1,1]], w:5, h:1 },
  // 2x1
  { shape: [[1],[1]], w:1, h:2 },
  // 3x1
  { shape: [[1],[1],[1]], w:1, h:3 },
  // 4x1
  { shape: [[1],[1],[1],[1]], w:1, h:4 },
  // 5x1
  { shape: [[1],[1],[1],[1],[1]], w:1, h:5 },
  // 2x2
  { shape: [[1,1],[1,1]], w:2, h:2 },
  // 3x3
  { shape: [[1,1,1],[1,1,1],[1,1,1]], w:3, h:3 },
  // L shapes
  { shape: [[1,0],[1,0],[1,1]], w:2, h:3 },
  { shape: [[0,1],[0,1],[1,1]], w:2, h:3 },
  { shape: [[1,1,1],[1,0,0]], w:3, h:2 },
  { shape: [[1,1,1],[0,0,1]], w:3, h:2 },
  { shape: [[1,1],[0,1],[0,1]], w:2, h:3 },
  { shape: [[1,1],[1,0],[1,0]], w:2, h:3 },
  { shape: [[1,0,0],[1,1,1]], w:3, h:2 },
  { shape: [[0,0,1],[1,1,1]], w:3, h:2 },
  // T shapes
  { shape: [[1,1,1],[0,1,0]], w:3, h:2 },
  { shape: [[0,1,0],[1,1,1]], w:3, h:2 },
  { shape: [[1,0],[1,1],[1,0]], w:2, h:3 },
  { shape: [[0,1],[1,1],[0,1]], w:2, h:3 },
  // S/Z
  { shape: [[0,1,1],[1,1,0]], w:3, h:2 },
  { shape: [[1,1,0],[0,1,1]], w:3, h:2 },
  { shape: [[1,0],[1,1],[0,1]], w:2, h:3 },
  { shape: [[0,1],[1,1],[1,0]], w:2, h:3 },
  // 2x3 filled
  { shape: [[1,1],[1,1],[1,1]], w:2, h:3 },
  // corner
  { shape: [[1,1,1],[1,0,0],[1,0,0]], w:3, h:3 },
  { shape: [[1,1,1],[0,0,1],[0,0,1]], w:3, h:3 },
  { shape: [[1,0,0],[1,0,0],[1,1,1]], w:3, h:3 },
  { shape: [[0,0,1],[0,0,1],[1,1,1]], w:3, h:3 },
];

let grid = [];
let score = 0;
let best = parseInt(localStorage.getItem('blockblast_best') || '0');
let currentPieces = [null, null, null];
let selectedSlot = -1;
let dragActive = false;
let dragSlot = -1;

const boardEl = document.getElementById('board');
const piecesArea = document.getElementById('pieces-area');
const scoreEl = document.getElementById('score-display');
const bestEl = document.getElementById('best-display');
const dragPieceEl = document.getElementById('drag-piece');
const dragPieceGrid = dragPieceEl.querySelector('.piece-grid');
const gameOverEl = document.getElementById('game-over');
const comboBanner = document.getElementById('combo-banner');

function initGrid() {
  grid = Array.from({length: GRID}, () => Array(GRID).fill(-1));
}

function initBoard() {
  boardEl.innerHTML = '';
  for (let r = 0; r < GRID; r++) {
    for (let c = 0; c < GRID; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.r = r;
      cell.dataset.c = c;
      boardEl.appendChild(cell);
    }
  }
}

function renderBoard() {
  const cells = boardEl.querySelectorAll('.cell');
  cells.forEach(cell => {
    const r = parseInt(cell.dataset.r);
    const c = parseInt(cell.dataset.c);
    const v = grid[r][c];
    cell.className = 'cell';
    if (v >= 0) {
      cell.classList.add('filled', `color-${v}`);
    }
  });
}

function getCellEl(r, c) {
  return boardEl.querySelector(`.cell[data-r="${r}"][data-c="${c}"]`);
}

function randomPiece() {
  const template = PIECES[Math.floor(Math.random() * PIECES.length)];
  const color = Math.floor(Math.random() * COLORS);
  return { shape: template.shape, color, w: template.w, h: template.h };
}

function dealPieces() {
  currentPieces = [randomPiece(), randomPiece(), randomPiece()];
  renderPieces();
}

function renderPieces() {
  for (let i = 0; i < 3; i++) {
    const slot = document.getElementById(`slot-${i}`);
    slot.innerHTML = '';
    slot.className = 'piece-slot';
    if (!currentPieces[i]) {
      slot.classList.add('used');
      continue;
    }
    slot.classList.remove('used');
    slot.appendChild(buildPieceEl(currentPieces[i], 20, 3));
    // Events
    slot.onmousedown = (e) => startDrag(e, i);
    slot.ontouchstart = (e) => startDrag(e, i);
  }
}

function buildPieceEl(piece, cellSize, gap) {
  const pg = document.createElement('div');
  pg.className = 'piece-grid';
  pg.style.gridTemplateColumns = `repeat(${piece.w}, ${cellSize}px)`;
  pg.style.gridTemplateRows = `repeat(${piece.h}, ${cellSize}px)`;
  pg.style.gap = gap + 'px';
  for (let r = 0; r < piece.h; r++) {
    for (let c = 0; c < piece.w; c++) {
      const pc = document.createElement('div');
      pc.className = 'piece-cell';
      if (piece.shape[r][c]) {
        pc.classList.add(`color-${piece.color}`);
        const colorMap = ['#ff4757','#2ed573','#1e90ff','#ffa502','#a855f7','#06d6a0','#ff6b9d'];
        const shadowMap = ['#c23348','#1ea854','#1260cc','#c47d00','#7e22ce','#059669','#c4396e'];
        pc.style.background = colorMap[piece.color];
        pc.style.boxShadow = `0 ${Math.round(cellSize/9)}px 0 ${shadowMap[piece.color]}, inset 0 1px 0 rgba(255,255,255,0.3)`;
        pc.style.borderRadius = Math.round(cellSize/4) + 'px';
        pc.style.width = cellSize + 'px';
        pc.style.height = cellSize + 'px';
      } else {
        pc.classList.add('empty');
        pc.style.width = cellSize + 'px';
        pc.style.height = cellSize + 'px';
      }
      pg.appendChild(pc);
    }
  }
  return pg;
}

// --- Drag / Drop ---
let dragOffsetR = 0;
let dragOffsetC = 0;
let lastHoverR = -1;
let lastHoverC = -1;

function startDrag(e, slotIdx) {
  if (!currentPieces[slotIdx]) return;
  e.preventDefault();
  dragSlot = slotIdx;
  dragActive = true;
  selectedSlot = slotIdx;

  // Build drag visual
  const piece = currentPieces[slotIdx];
  dragPieceGrid.innerHTML = '';
  dragPieceGrid.style.gridTemplateColumns = `repeat(${piece.w}, 38px)`;
  dragPieceGrid.style.gridTemplateRows = `repeat(${piece.h}, 38px)`;
  dragPieceGrid.style.gap = '3px';
  for (let r = 0; r < piece.h; r++) {
    for (let c = 0; c < piece.w; c++) {
      const pc = document.createElement('div');
      pc.className = 'piece-cell';
      if (piece.shape[r][c]) {
        const colorMap = ['#ff4757','#2ed573','#1e90ff','#ffa502','#a855f7','#06d6a0','#ff6b9d'];
        const shadowMap = ['#c23348','#1ea854','#1260cc','#c47d00','#7e22ce','#059669','#c4396e'];
        pc.style.background = colorMap[piece.color];
        pc.style.boxShadow = `0 4px 0 ${shadowMap[piece.color]}, inset 0 1px 0 rgba(255,255,255,0.3)`;
        pc.style.borderRadius = '8px';
        pc.style.width = '38px';
        pc.style.height = '38px';
        pc.style.display = 'block';
        pc.style.position = 'relative';
        pc.style.overflow = 'hidden';
        const shine = document.createElement('div');
        shine.style.cssText = 'position:absolute;top:3px;left:3px;right:30%;height:35%;background:rgba(255,255,255,0.25);border-radius:3px;';
        pc.appendChild(shine);
      } else {
        pc.classList.add('empty');
        pc.style.background = 'transparent';
        pc.style.width = '38px';
        pc.style.height = '38px';
      }
      dragPieceGrid.appendChild(pc);
    }
  }

  dragPieceEl.style.display = 'block';
  moveDrag(e);

  if (e.type === 'mousedown') {
    document.addEventListener('mousemove', onDragMove);
    document.addEventListener('mouseup', onDragEnd);
  } else {
    document.addEventListener('touchmove', onDragMove, { passive: false });
    document.addEventListener('touchend', onDragEnd);
  }
}

function getClientXY(e) {
  if (e.touches) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
  return { x: e.clientX, y: e.clientY };
}

function moveDrag(e) {
  const { x, y } = getClientXY(e);
  dragPieceEl.style.left = x + 'px';
  dragPieceEl.style.top = y + 'px';

  // Determine board cell
  const boardRect = boardEl.getBoundingClientRect();
  const cellSize = 38 + 3; // cell + gap
  const piece = currentPieces[dragSlot];
  const padX = boardRect.left + 10; // board padding
  const padY = boardRect.top + 10;

  const boardX = x - padX;
  const boardY = y - padY;

  // Center piece on cursor
  const hoverC = Math.floor((boardX - (piece.w * cellSize) / 2 + cellSize / 2) / cellSize);
  const hoverR = Math.floor((boardY - (piece.h * cellSize) / 2 + cellSize / 2) / cellSize);

  if (hoverR !== lastHoverR || hoverC !== lastHoverC) {
    clearGhost();
    lastHoverR = hoverR;
    lastHoverC = hoverC;
    showGhost(piece, hoverR, hoverC);
  }
}

function showGhost(piece, startR, startC) {
  const canPlace = canPlacePiece(piece, startR, startC);
  for (let r = 0; r < piece.h; r++) {
    for (let c = 0; c < piece.w; c++) {
      if (!piece.shape[r][c]) continue;
      const gr = startR + r;
      const gc = startC + c;
      if (gr < 0 || gr >= GRID || gc < 0 || gc >= GRID) continue;
      const cell = getCellEl(gr, gc);
      if (!cell) continue;
      if (grid[gr][gc] >= 0) continue;
      if (canPlace) {
        cell.classList.add('ghost', `color-${piece.color}`);
      } else {
        cell.classList.add('ghost');
        cell.style.background = 'rgba(255,80,80,0.25)';
      }
    }
  }
}

function clearGhost() {
  boardEl.querySelectorAll('.ghost').forEach(c => {
    c.classList.remove('ghost', ...Array.from({length:COLORS},(_,i)=>`color-${i}`));
    c.style.background = '';
  });
}

function canPlacePiece(piece, startR, startC) {
  for (let r = 0; r < piece.h; r++) {
    for (let c = 0; c < piece.w; c++) {
      if (!piece.shape[r][c]) continue;
      const gr = startR + r;
      const gc = startC + c;
      if (gr < 0 || gr >= GRID || gc < 0 || gc >= GRID) return false;
      if (grid[gr][gc] >= 0) return false;
    }
  }
  return true;
}

function onDragMove(e) {
  e.preventDefault && e.preventDefault();
  moveDrag(e);
}

function onDragEnd(e) {
  document.removeEventListener('mousemove', onDragMove);
  document.removeEventListener('mouseup', onDragEnd);
  document.removeEventListener('touchmove', onDragMove);
  document.removeEventListener('touchend', onDragEnd);

  dragPieceEl.style.display = 'none';

  const piece = currentPieces[dragSlot];
  if (canPlacePiece(piece, lastHoverR, lastHoverC)) {
    placePiece(piece, lastHoverR, lastHoverC);
    currentPieces[dragSlot] = null;
    checkAllUsed();
  } else {
    // Invalid shake
    const slot = document.getElementById(`slot-${dragSlot}`);
    slot.classList.add('invalid-drop');
    setTimeout(() => slot.classList.remove('invalid-drop'), 300);
  }

  clearGhost();
  lastHoverR = -1;
  lastHoverC = -1;
  dragActive = false;
  dragSlot = -1;
  selectedSlot = -1;
  renderPieces();
}

function placePiece(piece, startR, startC) {
  for (let r = 0; r < piece.h; r++) {
    for (let c = 0; c < piece.w; c++) {
      if (!piece.shape[r][c]) continue;
      grid[startR + r][startC + c] = piece.color;
    }
  }
  // Count cells placed
  let placed = 0;
  for (let r = 0; r < piece.h; r++)
    for (let c = 0; c < piece.w; c++)
      if (piece.shape[r][c]) placed++;
  addScore(placed);
  renderBoard();
  checkClear();
}

function checkAllUsed() {
  if (currentPieces.every(p => p === null)) {
    dealPieces();
  } else {
    renderPieces();
    // Check game over
    if (!hasAnyMove()) {
      setTimeout(showGameOver, 400);
    }
  }
}

function hasAnyMove() {
  for (let i = 0; i < 3; i++) {
    if (!currentPieces[i]) continue;
    const piece = currentPieces[i];
    for (let r = 0; r <= GRID - piece.h; r++) {
      for (let c = 0; c <= GRID - piece.w; c++) {
        if (canPlacePiece(piece, r, c)) return true;
      }
    }
  }
  return false;
}

let comboCount = 0;

function checkClear() {
  const rowsToClear = [];
  const colsToClear = [];

  for (let r = 0; r < GRID; r++) {
    if (grid[r].every(v => v >= 0)) rowsToClear.push(r);
  }
  for (let c = 0; c < GRID; c++) {
    let full = true;
    for (let r = 0; r < GRID; r++) if (grid[r][c] < 0) { full = false; break; }
    if (full) colsToClear.push(c);
  }

  if (rowsToClear.length === 0 && colsToClear.length === 0) {
    comboCount = 0;
    return;
  }

  comboCount++;

  // Animate cleared cells
  const cleared = new Set();
  rowsToClear.forEach(r => { for (let c = 0; c < GRID; c++) cleared.add(`${r},${c}`); });
  colsToClear.forEach(c => { for (let r = 0; r < GRID; r++) cleared.add(`${r},${c}`); });

  cleared.forEach(key => {
    const [r, c] = key.split(',').map(Number);
    const cell = getCellEl(r, c);
    cell.classList.add('clear-flash');
  });

  setTimeout(() => {
    cleared.forEach(key => {
      const [r, c] = key.split(',').map(Number);
      const cell = getCellEl(r, c);
      cell.classList.remove('clear-flash');
      cell.classList.add('clearing');
    });

    setTimeout(() => {
      // Clear grid
      rowsToClear.forEach(r => { for (let c = 0; c < GRID; c++) grid[r][c] = -1; });
      colsToClear.forEach(c => { for (let r = 0; r < GRID; r++) grid[r][c] = -1; });

      const linesCleared = rowsToClear.length + colsToClear.length;
      const lineScore = linesCleared * 18 * (comboCount > 1 ? comboCount : 1);
      addScore(lineScore);
      showLineScore(lineScore, rowsToClear, colsToClear);

      if (comboCount > 1) showCombo(comboCount);

      renderBoard();

      // Check game over after clearing
      setTimeout(() => {
        if (!hasAnyMove()) showGameOver();
      }, 200);
    }, 350);
  }, 60);
}

function showLineScore(pts, rows, cols) {
  // Show particle at center of board
  const boardRect = boardEl.getBoundingClientRect();
  const cx = boardRect.left + boardRect.width / 2;
  const cy = boardRect.top + boardRect.height / 2;
  spawnParticle(`+${pts}`, cx, cy);
}

function spawnParticle(text, x, y) {
  const p = document.createElement('div');
  p.className = 'score-particle';
  p.textContent = text;
  p.style.left = (x + (Math.random()-0.5)*60) + 'px';
  p.style.top = (y + (Math.random()-0.5)*40) + 'px';
  document.body.appendChild(p);
  setTimeout(() => p.remove(), 900);
}

function showCombo(count) {
  comboBanner.textContent = `${count}x COMBO!`;
  comboBanner.className = '';
  void comboBanner.offsetWidth;
  comboBanner.className = 'show';
}

function addScore(pts) {
  score += pts;
  if (score > best) {
    best = score;
    localStorage.setItem('blockblast_best', best);
  }
  updateScoreDisplay(true);
}

function updateScoreDisplay(pop) {
  scoreEl.textContent = score;
  bestEl.textContent = `Best: ${best}`;
  if (pop) {
    scoreEl.classList.remove('pop');
    void scoreEl.offsetWidth;
    scoreEl.classList.add('pop');
    setTimeout(() => scoreEl.classList.remove('pop'), 200);
  }
}

function showGameOver() {
  document.getElementById('go-score').textContent = score;
  document.getElementById('go-best').textContent = `Best: ${best}`;
  gameOverEl.classList.add('show');
}

function restartGame() {
  gameOverEl.classList.remove('show');
  score = 0;
  comboCount = 0;
  initGrid();
  renderBoard();
  updateScoreDisplay(false);
  dealPieces();
}

document.getElementById('restart-btn').onclick = restartGame;

// Init
initGrid();
initBoard();
updateScoreDisplay(false);
dealPieces();
</script>
</body>
